name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4

      - name: Checkout Core dependency
        uses: actions/checkout@v4
        with:
          repository: Capsule7446/healix-core
          path: healix-core

      - name: Use checked out Core dependency
        run: go mod edit -replace=github.com/Capsule7446/healix-core=./healix-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate and build
        env:
          CGO_ENABLED: "1"
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -short ./...
          go test -race ./...
          go build ./...

      - name: Package source
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="healix-rod-${TAG}/" "$TAG" -o "dist/healix-rod-${TAG}.tar.gz"
          sha256sum dist/* > dist/SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes 2>/dev/null || true
          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
